name: Environment and Secrets Workflow

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:

  deploy-to-aws:
    runs-on: ubuntu-latest

    env:
      DEPLOYMENT_NAME: MyAppDeployment

    steps:
      - name: Print Workflow-Level Variables
        run: |
          echo Region: $AWS_REGION
          echo Environment: $ENVIRONMENT

      - name: Print Job-Level Variable
        run:  |
            echo "Deployment Name: $DEPLOYMENT_NAME"

      - name: Access Secrets
        run:  |
          echo "AWS Access Key: ${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS Secret Key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Step-Level Variable Example
        env:
          STEP_MESSAGE: "This is a step-level variable"
        run: echo "$STEP_MESSAGE"